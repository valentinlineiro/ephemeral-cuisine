name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Inject Supabase config
        run: |
          sed -i "s|YOUR_SUPABASE_PROJECT_URL|${{ secrets.SUPABASE_URL }}|g" src/environments/environment.prod.ts
          sed -i "s|YOUR_SUPABASE_ANON_KEY|${{ secrets.SUPABASE_ANON_KEY }}|g" src/environments/environment.prod.ts

      # base-href must match the repo name for GitHub Pages sub-path
      # If you add a custom domain, change this to /
      - name: Build
        run: npm run build:prod -- --base-href /ephemeral-cuisine/

      # Copy index.html → 404.html so Angular routing works on direct URL loads
      - name: SPA routing fallback
        run: cp dist/ephemeral-cuisine/browser/index.html dist/ephemeral-cuisine/browser/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/ephemeral-cuisine/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
